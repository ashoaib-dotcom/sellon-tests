stages:
  - test

# Playwright image has Chromium + all system deps pre-installed
default:
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  before_script:
    - npm ci

# Shared template for all test jobs
.test-template:
  stage: test
  tags:
    - kasm
  script:
    - mkdir -p screenshots
    - npx playwright test $TEST_FILE --reporter=html,list
  artifacts:
    when: always
    paths:
      - screenshots/
      - playwright-report/
    expire_in: 14 days
    name: "$CI_JOB_NAME-report"
  # Run on push to main, manual trigger, or scheduled pipeline
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ── Test suites ───────────────────────────────────────────────────────────────

dashboard:
  extends: .test-template
  variables:
    TEST_FILE: tests/dashboard-pom.spec.ts

