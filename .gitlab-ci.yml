stages:
  - test

# Shell executor runner — install Node.js via nvm if not already present
default:
  before_script:
    - apt update
    - |
      apt-get install -y libnspr4 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
      libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
      libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libatspi2.0-0 curl net-tools
    - export NVM_DIR="${HOME}/.nvm"
    - |
      if [ ! -s "$NVM_DIR/nvm.sh" ]; then
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      fi
    - source "$NVM_DIR/nvm.sh"
    - nvm install 20
    - nvm use 20
    - node --version
    - npm --version
    - npm ci
    - npx playwright install-deps chromium
    - npx playwright install chromium

# Shared template for all test jobs
.test-template:
  stage: test
  image: debian:trixie
  tags:
    - kasm_docker
  script:
    - mkdir -p screenshots
    - npx playwright test $TEST_FILE --reporter=html,list
  artifacts:
    when: always
    paths:
      - screenshots/
      - playwright-report/
    expire_in: 14 days
    name: "$CI_JOB_NAME-report"
  # Run on push to main, manual trigger, or scheduled pipeline
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

