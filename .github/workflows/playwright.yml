name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Specific test file to run (leave empty for all)'
        required: false
        default: ''

jobs:
  test:
    name: ${{ matrix.test-suite }}
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - test-suite: dashboard
            file: tests/dashboard-pom.spec.ts
          - test-suite: login
            file: tests/login-pom.spec.ts
          - test-suite: orders
            file: tests/orders-pom.spec.ts
          - test-suite: orders-filters
            file: tests/orders-filters-pom.spec.ts
          - test-suite: product-filters
            file: tests/product-filters-pom.spec.ts
          - test-suite: product-edit
            file: tests/product-edit-pom.spec.ts
          - test-suite: product-create
            file: tests/product-create-pom.spec.ts
          - test-suite: product-delete
            file: tests/product-delete-pom.spec.ts
          - test-suite: product-import
            file: tests/product-import-pom.spec.ts
          - test-suite: stock-import
            file: tests/stock-import-pom.spec.ts
          - test-suite: export
            file: tests/export-pom.spec.ts
          - test-suite: product-validations
            file: tests/product-validations-pom.spec.ts
          - test-suite: order-workflow
            file: tests/order-workflow-pom.spec.ts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Run ${{ matrix.test-suite }} tests
        run: npx playwright test ${{ matrix.file }} --reporter=html,list
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.test-suite }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.test-suite }}
          path: playwright-report/
          retention-days: 14

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "================================================"
          echo "All test suites completed."
          echo "Check individual job results above for pass/fail."
          echo "================================================"